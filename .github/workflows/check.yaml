# reusable workflow triggered by other actions
name: CI

on:
  workflow_call:
    secrets:
      CHARMCRAFT_CREDENTIALS:
        required: true

jobs:

  lint:
    name: Lint Check
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get install python3-pip tox

    - name: Lint code
      run: tox -e lint

  unit:
    name: Unit Test
    runs-on: ubuntu-24.04

    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: sudo apt-get install python3-pip tox

    - name: Run unit tests
      run: tox -e unit

  integration:
    name: Integration Test
    runs-on: ubuntu-24.04

    steps:
    - name: Check out repo
      uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Setup operator environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

        sudo snap install --classic concierge
        sudo concierge prepare -p k8s

    - name: Run integration tests
      run: tox -e integration

    # On failure, capture debugging resources
    - name: Get all
      run: kubectl get all -A
      if: failure()

    - name: Describe deployments
      run: kubectl describe deployments -A
      if: failure()

    - name: Get juju status
      run: juju status
      if: failure()

    - name: Get velero-integrator logs
      run: juju debug-log --replay --include velero-integrator/0
      if: failure()

  integration-e2e:
    name: E2E Integration Test
    runs-on: ubuntu-24.04

    steps:
    - name: Check out repo
      uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: 3.13

    - name: Setup operator environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox

        sudo snap install --classic concierge
        sudo concierge prepare -p k8s

    - name: Run e2e integration tests
      run: tox -e integration-e2e
      env:
        CI: "true"

    # On failure, capture debugging resources
    - name: Get all
      run: kubectl get all -A
      if: failure()

    - name: Describe Velero resources
      run: |
        kubectl describe schedules.velero.io -A || true
        kubectl describe backups.velero.io -A || true
        kubectl describe backupstoragelocations.velero.io -A || true
      if: failure()

    - name: Get juju status
      run: juju status
      if: failure()

    - name: Get velero-integrator logs
      run: juju debug-log --replay --include velero-integrator/0
      if: failure()

    - name: Get velero-operator logs
      run: juju debug-log --replay --include velero-operator/0
      if: failure()
